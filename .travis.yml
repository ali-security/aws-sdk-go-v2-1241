language: go
sudo: true
dist: bionic

branches:
    only:
      - main

os:
  - linux
go:
  - '1.21'
matrix:
    allow_failures:
      - go: tip

before_install:
  - if [ "$TRAVIS_OS_NAME" = "windows" ]; then choco install make; fi
  - (cd /tmp/; go get golang.org/x/lint/golint)

env:
  - EACHMODULE_CONCURRENCY=4

script:
  - make ci-test-no-generate;

